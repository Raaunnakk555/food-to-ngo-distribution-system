<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Food Distribution</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Create Account</h2>

            <div class="form-group">
                <input id="name" type="text" placeholder="Full Name">
            </div>
            
            <div class="form-group">
                <input id="email" type="email" placeholder="Email Address">
            </div>
            
            <div class="form-group">
                <input id="password" type="password" placeholder="Password">
            </div>

            <div class="form-group">
                <select id="role" onchange="toggleCapacity()">
                    <option value="restaurant">Restaurant</option>
                    <option value="ngo">NGO</option>
                </select>
            </div>

            <!-- 🔥 NEW: Certificate Upload -->
            <div class="form-group" id="cert-group">
                <input id="certificate" type="file" accept=".pdf,.jpg,.png">
            </div>

            <div class="form-group" id="capacity-group" style="display: none;">
                <input id="capacity" type="number" placeholder="NGO Capacity (SMU)">
            </div>

            <button onclick="signup()">Signup</button>

            <p class="text-center" style="margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script>
        function toggleCapacity() {
            const role = document.getElementById('role').value;

            document.getElementById('capacity-group').style.display = role === 'ngo' ? 'block' : 'none';
            document.getElementById('cert-group').style.display = role === 'restaurant' ? 'block' : 'none';
        }

        // 🔥 IMPORTANT: run on page load
        toggleCapacity();
    </script>

    <script src="script.js"></script>
</body>
</html>
