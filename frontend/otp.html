<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Food Distribution</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Verify Pickup</h2>
            <p class="text-center" style="color: var(--text-muted); margin-bottom: 1.5rem;">Enter the OTP details below</p>

            <div class="form-group">
                <input id="order_id" type="number" placeholder="Order ID">
            </div>
            
            <div class="form-group">
                <input id="otp" type="text" placeholder="Enter OTP" maxlength="4">
            </div>

            <button onclick="verifyOTP()">Verify</button>

            <p class="text-center" style="margin-top: 1.5rem;">
                <a href="ngo.html">&larr; Back to Dashboard</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check authentication
        if (!sessionStorage.getItem("user")) {
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
